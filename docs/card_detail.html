<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡牌详情 &mdash; 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css?v=10">
</head>
<body>
  <div class="app-container">
    <nav class="nav-bar">
      <a href="./index.html" class="nav-brand">
        <div class="brand-icon"></div>
        <div><h1>POKÉ CARD</h1><span>卡牌详情</span></div>
      </a>
      <div class="nav-links">
        <a href="./index.html"     class="nav-link">我的卡牌</a>
        <a href="./dashboard.html" class="nav-link">资产看板</a>
        <a href="./price.html"     class="nav-link">价格行情</a>
      </div>
    </nav>

    <div style="margin-bottom:24px;">
      <button class="btn btn-outline btn-sm" onclick="history.back()">← 返回我的卡牌</button>
    </div>

    <div class="detail-grid">
      <div class="detail-image-section" id="imageSection">
        <img src="" alt="" class="detail-main-image" id="detailImage">
      </div>
      <div>
        <h2 id="detailName" style="font-size:clamp(18px,2.5vw,26px);font-weight:900;letter-spacing:-.02em;margin-bottom:4px;color:var(--text-primary);"></h2>
        <p id="detailNameEn" style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:18px;letter-spacing:.03em;"></p>

        <div id="detailFields" class="detail-card-group">
          <div class="detail-card">
            <div class="detail-card-title"><span class="detail-card-icon icon-pokeball"></span>基本信息</div>
            <div class="detail-card-body" id="detailBasicInfo"></div>
          </div>
          <div class="detail-card">
            <div class="detail-card-title"><span class="detail-card-icon icon-folder"></span>持有信息</div>
            <div class="detail-card-body" id="detailHoldInfo"></div>
          </div>
          <div class="detail-card detail-card-price">
            <div class="detail-card-title"><span class="detail-card-icon icon-price"></span>价格信息</div>
            <div class="detail-card-body" id="detailPriceInfo"></div>
          </div>
        </div>

        <div class="detail-actions" id="detailActions">
          <button class="btn btn-primary btn-sm" onclick="openEditModal()">编辑</button>
          <a href="./price.html" class="btn btn-outline btn-sm">查看价格行情</a>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal()">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header"><h2>编辑卡牌</h2><button class="modal-close" onclick="closeEditModal()">&times;</button></div>
      <form id="editForm" onsubmit="saveEditCard(event)">
        <div class="modal-body">
          <div class="form-group">
            <label>卡牌图片</label>
            <div class="image-upload-area" id="editImageArea" onclick="document.getElementById('editImageInput').click()">
              <img id="editImagePreview" src="" style="display:none;">
              <p class="upload-hint" id="editUploadHint">点击更换图片</p>
              <input type="file" id="editImageInput" accept="image/*" style="display:none;" onchange="previewEditImage(event)">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>卡牌名称 *</label><input type="text" name="name" required></div>
            <div class="form-group"><label>英文名</label><input type="text" name="name_en"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>系列</label><input type="text" name="set_name"></div>
            <div class="form-group"><label>编号</label><input type="text" name="card_number"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>稀有度</label>
              <select name="rarity">
                <option value="C">C</option><option value="U">U</option><option value="R">R</option><option value="RR">RR</option>
                <option value="SR">SR</option><option value="SAR">SAR</option><option value="UR">UR</option><option value="CSR">CSR</option><option value="HR">HR</option>
              </select>
            </div>
            <div class="form-group">
              <label>品相</label>
              <select name="condition">
                <option value="NM">NM</option><option value="LP">LP</option><option value="MP">MP</option><option value="HP">HP</option><option value="Damaged">Damaged</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>持有数量</label><input type="number" name="quantity" min="1" step="1"></div>
            <div class="form-group"><label>收购单价（元）</label><input type="number" name="cost_price" min="0" step="1"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>当下市场价（元）</label><input type="number" name="market_price" min="0" step="1"></div>
            <div class="form-group"><label>备注</label><input type="text" name="notes" style="width:100%;"></div>
          </div>
          <input type="hidden" name="id" id="editCardId">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeEditModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存修改</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:440px;">
      <div class="modal-header"><h2>确认删除</h2><button class="modal-close" onclick="closeDeleteModal()">&times;</button></div>
      <div class="modal-body">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px;">此操作不可恢复，确定要删除这张卡吗？</p>
        <p style="font-weight:700;font-size:15px;" id="deleteCardName"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmDeleteDetail()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase-config.js?v=12"></script>
  <script src="./assets/app.js?v=12"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const loggedIn = await isLoggedIn();
      if (!loggedIn) { window.location.href = './login.html'; return; }
      if (typeof loadDetailPage === 'function') loadDetailPage();
    });
  </script>
</body>
</html>
