<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台 - 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css?v=10">
  <style>
    .admin-page { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    .admin-header h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .admin-header .brand-icon { width: 32px; height: 32px; background: var(--gold-500); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
    .admin-nav { display: flex; gap: 6px; align-items: center; }
    .admin-nav a, .admin-nav .nav-tab { font-size: 13px; color: var(--text-secondary); text-decoration: none; cursor: pointer; padding: 6px 14px; border-radius: 6px; }
    .admin-nav a:hover, .admin-nav .nav-tab:hover { color: var(--gold-500); background: rgba(212,175,55,.08); }
    .admin-nav .nav-tab.active { background: var(--gold-500); color: #fff; font-weight: 600; }
    .section-title {
      font-size: 15px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg-card); border-radius: 10px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 800; font-family: 'Montserrat', sans-serif; }
    .table-wrapper { background: var(--bg-card); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 16px; background: var(--bg-primary); font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .role-admin { background: #fde8e8; color: #c53030; }
    .role-user { background: #e8f0fe; color: #2b6cb0; }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; }
    .catalog-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg-card); border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--bg-primary); color: var(--text-primary); box-sizing: border-box; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <h1>
        <div class="brand-icon">⚙</div>
        管理后台
      </h1>
      <div class="admin-nav">
        <a href="./index.html">前台首页</a>
        <a href="./catalog.html">卡牌数据库</a>
        <a class="nav-tab active">用户管理</a>
        <a class="nav-tab" href="./admin-cards.html">卡牌管理</a>
        <a onclick="doLogout()">退出登录</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="adminStats">
      <div class="stat-card"><div class="stat-label">加载中...</div><div class="stat-value">--</div></div>
    </div>

    <!-- Users -->
    <div class="section-title">👥 用户列表</div>
    <div class="table-wrapper" style="margin-bottom:32px;">
      <table>
        <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>昵称</th><th>角色</th><th>卡牌数</th><th>注册时间</th></tr></thead>
        <tbody id="usersTableBody"><tr><td colspan="7" style="text-align:center;color:var(--text-muted);">加载中...</td></tr></tbody>
      </table>
    </div>

    <div id="toastContainer" class="toast-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase-config.js?v=12"></script>
  <script>
    // ---- Toast ----
    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + (type || 'success');
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ---- Logout ----
    async function doLogout() {
      await authLogout();
      window.location.href = './login.html';
    }

    // ---- Admin Stats ----
    async function loadAdminStats() {
      try {
        // Count users (profiles)
        const { count: userCount } = await supabase
          .from('profiles')
          .select('*', { count: 'exact', head: true });

        // Count cards
        const { count: cardCount } = await supabase
          .from('cards')
          .select('*', { count: 'exact', head: true });

        // Count catalog
        const { count: catalogCount } = await supabase
          .from('card_catalog')
          .select('*', { count: 'exact', head: true });

        document.getElementById('adminStats').innerHTML = `
          <div class="stat-card"><div class="stat-label">用户总数</div><div class="stat-value">${userCount || 0}</div></div>
          <div class="stat-card"><div class="stat-label">卡牌总数</div><div class="stat-value">${cardCount || 0}</div></div>
          <div class="stat-card"><div class="stat-label">数据库卡种</div><div class="stat-value">${catalogCount || 0}</div></div>`;
      } catch (e) {
        document.getElementById('adminStats').innerHTML = `<div class="stat-card"><div class="stat-label">错误</div><div class="stat-value">--</div></div>`;
      }
    }

    // ---- Users List ----
    async function loadUsers() {
      try {
        // Fetch all profiles (admin can see all via RLS)
        const { data: profiles, error } = await supabase
          .from('profiles')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        // Fetch all cards' user_id to compute card counts per user
        const { data: cards } = await supabase
          .from('cards')
          .select('user_id');

        const cardCountMap = {};
        (cards || []).forEach(c => {
          if (c.user_id) cardCountMap[c.user_id] = (cardCountMap[c.user_id] || 0) + 1;
        });

        document.getElementById('usersTableBody').innerHTML = (profiles || []).map(u => `
          <tr>
            <td style="font-family:monospace;font-size:11px;">${(u.id || '').slice(0, 8)}...</td>
            <td style="font-weight:600;">${u.username || '--'}</td>
            <td style="font-family:monospace;font-size:12px;">${u.email || '--'}</td>
            <td>${u.nick_name || '--'}</td>
            <td><span class="role-badge role-${u.role === 'admin' ? 'admin' : 'user'}">${u.role || 'user'}</span></td>
            <td>${cardCountMap[u.id] || 0}</td>
            <td style="font-size:11px;">${(u.created_at || '').split('T')[0]}</td>
          </tr>`).join('');
      } catch (e) {
        document.getElementById('usersTableBody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--red-500);">加载失败：${e.message}</td></tr>`;
      }
    }

    // ---- Init: verify admin access ----
    document.addEventListener('DOMContentLoaded', async () => {
      const loggedIn = await isLoggedIn();
      if (!loggedIn) { window.location.href = './login.html'; return; }

      const admin = await isAdmin();
      if (!admin) {
        showToast('无管理员权限', 'error');
        setTimeout(() => window.location.href = './index.html', 1500);
        return;
      }

      loadAdminStats();
      loadUsers();
      loadCatalogItems();
    });
  </script>
</body>
</html>
