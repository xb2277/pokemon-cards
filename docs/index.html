<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css?v=10">
</head>
<body>

  <div class="app-container">
    <nav class="nav-bar">
      <a href="./index.html" class="nav-brand">
        <div class="brand-icon"></div>
        <div>
          <h1>POKÉ CARD</h1>
          <span>宝可梦卡牌收藏册</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="./index.html"     class="nav-link active">我的卡牌</a>
        <a href="./dashboard.html" class="nav-link">资产看板</a>
        <a href="./price.html"     class="nav-link">价格行情</a>
      </div>
    </nav>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索卡名 / 编号 / 系列 ...">
      </div>
      <select class="filter-select" id="rarityFilter">
        <option value="all">全部稀有度</option>
      </select>
      <select class="filter-select" id="sortBySelect">
        <option value="updated_at">最近更新</option>
        <option value="name">按名称</option>
        <option value="set_name">按系列</option>
        <option value="rarity">按稀有度</option>
        <option value="quantity">按数量</option>
        <option value="cost_price">按收购价</option>
      </select>
      <button class="btn btn-outline" onclick="window.location='./catalog.html'">卡牌数据库</button>
      <button class="btn btn-primary" onclick="openAddModal()">新增卡牌</button>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="inventory-section" id="inventorySection">
      <div class="section-header">
        <h2 class="section-title">库存概览</h2>
        <div class="section-actions">
          <button class="btn btn-outline btn-sm" id="btnGridView" onclick="toggleView('grid')">卡片视图</button>
          <button class="btn btn-outline btn-sm active" id="btnTableView" onclick="toggleView('table')">表格视图</button>
        </div>
      </div>
    </div>

    <div class="table-wrapper" id="inventoryTableWrapper" style="display:none;">
      <table class="inventory-table">
        <thead>
          <tr>
            <th>卡牌</th><th>系列</th><th>编号</th><th>稀有度</th><th>品相</th><th>数量</th><th>收购单价</th><th>当下市场价</th><th>持有总价</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="inventoryTableBody"></tbody>
      </table>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
    <div class="pagination-wrap" id="pagination"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">🃏</div>
      <p>收藏册还是空的<br><small>点击上方「新增卡牌」开始建立你的收藏</small></p>
    </div>
  </div>

  <div class="modal-overlay" id="cardModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新增卡牌</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="cardForm" onsubmit="saveCard(event)">
        <input type="hidden" name="catalog_id" id="catalogIdField">
        <div class="modal-body">
          <div class="catalog-search-block" id="catalogSearchBlock">
            <label class="catalog-search-label">
              <span class="catalog-search-icon">🔍</span>
              从卡牌数据库选择
              <span class="catalog-search-hint">搜索或下拉选择卡牌</span>
            </label>
            <div class="catalog-search-select-wrap">
              <select id="catalogSelect" class="catalog-select" onchange="onCatalogSelectChange(this.value)">
                <option value="">-- 选择卡牌 --</option>
              </select>
            </div>
            <div class="catalog-search-wrap" style="margin-top: 8px;">
              <input type="text" id="catalogQuickSearch" class="catalog-search-input"
                placeholder="或输入关键词搜索…" autocomplete="off"
                oninput="onCatalogQuickInput(this.value)" onfocus="showCatalogDropdown()">
              <div class="catalog-dropdown" id="catalogDropdown"></div>
            </div>
            <div id="catalogSelectedCard" class="catalog-selected-card" style="display:none;"></div>
          </div>
          <div class="catalog-search-divider"><span>— 或手动填写 —</span></div>

          <div class="form-group">
            <label>卡牌图片</label>
            <div class="image-upload-area" id="imageArea" onclick="document.getElementById('imageInput').click()">
              <div class="image-preview-wrap">
                <img id="imagePreview" src="" style="display:none;" class="preview-img">
              </div>
              <p class="upload-hint" id="uploadHint">点击或拖拽上传图片</p>
              <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group"><label>卡牌名称 *</label><input type="text" name="name" required placeholder="如：皮卡丘 VMAX"></div>
            <div class="form-group"><label>英文名</label><input type="text" name="name_en" placeholder="Pikachu VMAX"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>系列</label><input type="text" name="set_name" placeholder="如：sV、剑盾"></div>
            <div class="form-group"><label>编号</label><input type="text" name="card_number" placeholder="如：060/072"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>稀有度</label>
              <select name="rarity">
                <option value="C">C &mdash; Common</option><option value="U">U &mdash; Uncommon</option>
                <option value="R" selected>R &mdash; Rare</option><option value="RR">RR &mdash; Double Rare</option>
                <option value="SR">SR &mdash; Special Rare</option><option value="SAR">SAR &mdash; Special Art Rare</option>
                <option value="UR">UR &mdash; Ultra Rare</option><option value="CSR">CSR &mdash; Character Super Rare</option>
                <option value="HR">HR &mdash; Hyper Rare</option>
              </select>
            </div>
            <div class="form-group">
              <label>品相</label>
              <select name="condition">
                <option value="NM" selected>NM &mdash; 近全新</option><option value="LP">LP &mdash; 轻微使用痕迹</option>
                <option value="MP">MP &mdash; 中度磨损</option><option value="HP">HP &mdash; 重度磨损</option>
                <option value="Damaged">Damaged &mdash; 损坏</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>持有数量</label><input type="number" name="quantity" value="1" min="1" step="1"></div>
            <div class="form-group"><label>收购单价（元）</label><input type="number" name="cost_price" value="0" min="0" step="1"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>当下市场价（元）</label><input type="number" name="market_price" value="0" min="0" step="1"></div>
            <div class="form-group"><label>备注</label><input type="text" name="notes" placeholder="来源渠道、特殊说明等…" style="width:100%;"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header"><h2>确认删除</h2><button class="modal-close" onclick="closeDeleteModal()">&times;</button></div>
      <div class="modal-body">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px;">此操作不可恢复，确定要删除这张卡吗？</p>
        <p style="font-weight:700;font-size:15px;" id="deleteCardName"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase-config.js?v=10"></script>
  <script src="./assets/app.js?v=10"></script>
</body>
</html>
