<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>价格行情 &mdash; 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css?v=10">
</head>
<body>
  <div class="app-container">
    <nav class="nav-bar">
      <a href="./index.html" class="nav-brand">
        <div class="brand-icon"></div>
        <div><h1>POKÉ CARD</h1><span>价格行情</span></div>
      </a>
      <div class="nav-links">
        <a href="./index.html"     class="nav-link">我的卡牌</a>
        <a href="./dashboard.html" class="nav-link">资产看板</a>
        <a href="./price.html"     class="nav-link active">价格行情</a>
      </div>
    </nav>

    <div class="price-hero">
      <div class="price-hero-inner">
        <div class="price-hero-left">
          <div class="price-hero-img" id="heroImgWrap">
            <div class="price-hero-img-placeholder" id="heroImgPlaceholder"><span>?</span></div>
            <img id="heroImg" src="" alt="" style="display:none;">
          </div>
        </div>
        <div class="price-hero-right">
          <h2 class="price-hero-title" id="heroTitle">选择一张卡牌查看价格行情</h2>
          <p class="price-hero-subtitle" id="heroSubtitle">数据来自卡牌数据库，支持关键词搜索</p>
          <div class="price-search-block">
            <div class="price-search-input-wrap">
              <input type="text" id="priceCatalogSearch" class="price-search-input" placeholder="输入卡名搜索（中文 / 英文）…" autocomplete="off">
              <div class="price-search-dropdown" id="priceSearchDropdown"></div>
            </div>
            <div class="price-search-hint" id="priceSearchHint">也可从下方下拉菜单选择</div>
            <select id="priceCatalogSelect" class="price-catalog-select">
              <option value="">-- 从卡牌数据库选择 --</option>
            </select>
          </div>
          <div class="price-hero-actions">
            <button class="btn btn-outline" onclick="showManualPrice()" id="manualBtn">手动录入</button>
          </div>
        </div>
      </div>
    </div>

    <div class="price-current-panel" id="priceCurrentPanel" style="display:none;">
      <div class="price-stat"><div class="price-stat-label">当前均价</div><div class="price-stat-value" id="statAvgPrice" style="color:var(--gold-400);">--</div></div>
      <div class="price-stat"><div class="price-stat-label">最高价</div><div class="price-stat-value" id="statMaxPrice" style="color:var(--green-400);">--</div></div>
      <div class="price-stat"><div class="price-stat-label">最低价</div><div class="price-stat-value" id="statMinPrice" style="color:var(--amber-400);">--</div></div>
      <div class="price-stat"><div class="price-stat-label">记录数</div><div class="price-stat-value" id="statRecordCount">--</div></div>
    </div>

    <div class="chart-container" id="chartArea" style="display:none;">
      <h3>价格走势</h3>
      <canvas id="priceChart"></canvas>
    </div>

    <div class="chart-container" id="manualInputArea" style="display:none;">
      <h3>手动录入价格</h3>
      <form onsubmit="submitManualPrice(event)" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <input type="number" id="manualPrice" placeholder="价格（元）" step="0.01" min="0" required style="flex:1;min-width:160px;padding:11px 14px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-primary);outline:none;">
        <input type="text" id="manualPlatform" placeholder="来源（如：闲鱼）" value="手动录入" style="width:160px;padding:11px 14px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-md);font-size:13px;color:var(--text-primary);outline:none;">
        <button type="submit" class="btn btn-success">录入</button>
      </form>
    </div>

    <div class="empty-state" id="priceEmptyState" style="display:none;">
      <div class="icon">📈</div>
      <p>选择一张卡牌查看价格走势<br><small>或先去我的卡牌添加你的卡牌</small></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/supabase-config.js"></script>
  <script src="./assets/echarts.min.js?v=1"></script>
  <script src="./assets/app.js?v=10"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const loggedIn = await isLoggedIn();
      if (!loggedIn) { window.location.href = './login.html'; return; }
      if (typeof loadPricePage === 'function') loadPricePage();
    });
  </script>
</body>
</html>
