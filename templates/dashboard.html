<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>资产看板 &mdash; 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

  <div class="app-container">

    <!-- ===== Navigation ===== -->
    <nav class="nav-bar">
      <a href="/" class="nav-brand">
        <div class="brand-icon"></div>
        <div>
          <h1>POKÉ CARD</h1>
          <span>资产看板</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="/"          class="nav-link" data-page="/">我的卡牌</a>
        <a href="/dashboard"  class="nav-link active" data-page="/dashboard">资产看板</a>
        <a href="/price"      class="nav-link" data-page="/price">价格行情</a>
      </div>
    </nav>

    <!-- ===== Stats Overview ===== -->
    <div class="stats-bar" id="dashStats"></div>

    <!-- ===== Charts Row ===== -->
    <div class="chart-row">
      <div class="chart-container">
        <h3>总价值趋势（近 90 天）</h3>
        <canvas id="dashboardTrendChart"></canvas>
      </div>
      <div class="chart-container">
        <h3>稀有度分布</h3>
        <canvas id="dashboardDistChart"></canvas>
      </div>
    </div>

    <!-- ===== Rankings ===== -->
    <div class="rankings-grid">
      <!-- Gainers -->
      <div class="ranking-panel">
        <div class="ranking-panel-header">
          <h3>涨幅 TOP 10</h3>
          <span class="badge badge-gain">盈利潜力</span>
        </div>
        <ul class="rank-list" id="gainersList">
          <li style="padding:28px;text-align:center;color:var(--text-muted);font-size:13px;">加载中…</li>
        </ul>
      </div>
      <!-- Losers -->
      <div class="ranking-panel">
        <div class="ranking-panel-header">
          <h3>跌幅 TOP 10</h3>
          <span class="badge badge-loss">关注风险</span>
        </div>
        <ul class="rank-list" id="losersList">
          <li style="padding:28px;text-align:center;color:var(--text-muted);font-size:13px;">加载中…</li>
        </ul>
      </div>
    </div>

  </div><!-- /.app-container -->

  <script src="/static/echarts.min.js?v=1"></script>
  <script src="/static/app.js?v=8"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof loadDashboard === 'function') loadDashboard();
    });
  </script>
</body>
</html>
