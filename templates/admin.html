<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台 - 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=5">
  <style>
    .admin-page { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    .admin-header h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .admin-header .brand-icon { width: 32px; height: 32px; background: var(--gold-500); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
    .admin-nav { display: flex; gap: 12px; align-items: center; }
    .admin-nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; }
    .admin-nav a:hover { color: var(--gold-500); }
    .section-title {
      font-size: 15px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card {
      background: var(--bg-card); border-radius: 10px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 800; font-family: 'Montserrat', sans-serif; }
    .table-wrapper { background: var(--bg-card); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 16px; background: var(--bg-primary); font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .role-admin { background: #fde8e8; color: #c53030; }
    .role-user { background: #e8f0fe; color: #2b6cb0; }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; }
    .catalog-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg-card); border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--bg-primary); color: var(--text-primary); box-sizing: border-box; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; animation: slideIn .3s; }
    .toast.success { background: #c6f6d5; color: #22543d; }
    .toast.error { background: #fed7d7; color: #822727; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <h1>
        <div class="brand-icon">⚙</div>
        管理后台
      </h1>
      <div class="admin-nav">
        <a href="/">前台首页</a>
        <a href="/catalog">卡牌数据库</a>
        <a href="#" onclick="doLogout()">退出登录</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="adminStats"></div>

    <!-- Users -->
    <div class="section-title">👥 用户列表</div>
    <div class="table-wrapper" style="margin-bottom:32px;">
      <table>
        <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>昵称</th><th>OpenID</th><th>手机号</th><th>角色</th><th>卡牌数</th><th>注册时间</th></tr></thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>

    <!-- Catalog -->
    <div class="section-title">📖 卡牌数据库管理</div>
    <div class="catalog-actions">
      <button class="btn btn-primary btn-sm" onclick="openCatalogModal()">新增卡种</button>
      <button class="btn btn-outline btn-sm" onclick="loadCatalogItems()">刷新列表</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>ID</th><th>图片</th><th>名称</th><th>系列</th><th>编号</th><th>稀有度</th><th>操作</th></tr></thead>
        <tbody id="catalogTableBody"></tbody>
      </table>
    </div>

    <!-- Catalog Edit Modal -->
    <div class="modal-overlay" id="catalogModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="catalogModalTitle">新增卡种</h2>
          <button class="modal-close" onclick="closeCatalogModal()">&times;</button>
        </div>
        <form id="catalogForm" onsubmit="saveCatalogItem(event)">
          <div class="modal-body">
            <input type="hidden" id="catalogEditId">
            <div class="form-row">
              <div class="form-group"><label>名称 *</label><input type="text" id="catName" required></div>
              <div class="form-group"><label>英文名</label><input type="text" id="catNameEn"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>系列</label><input type="text" id="catSetName"></div>
              <div class="form-group"><label>编号</label><input type="text" id="catCardNumber"></div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>稀有度</label>
                <select id="catRarity">
                  <option value="C">C</option><option value="U">U</option><option value="R" selected>R</option>
                  <option value="RR">RR</option><option value="SR">SR</option><option value="SAR">SAR</option>
                  <option value="UR">UR</option><option value="CSR">CSR</option><option value="HR">HR</option>
                </select>
              </div>
              <div class="form-group"><label>图片URL</label><input type="url" id="catImageUrl" placeholder="https://..."></div>
            </div>
            <div class="form-group"><label>描述</label><textarea id="catDesc" rows="2"></textarea></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeCatalogModal()">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('token') || '';

    function api(method, url, data) {
      const opts = { method, headers: {} };
      if (TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
      if (!(data instanceof FormData)) {
        opts.headers['Content-Type'] = 'application/json';
        if (data) opts.body = JSON.stringify(data);
      } else {
        opts.body = data;
      }
      return fetch(url, opts).then(r => {
        if (r.status === 401) { localStorage.clear(); window.location.href = '/login'; throw new Error('Unauthorized'); }
        const ct = r.headers.get('content-type') || '';
        if (ct.includes('application/json')) return r.json().then(j => j.success ? j : Promise.reject(new Error(j.message)));
        return r.text().then(t => Promise.reject(new Error('Server error: ' + t.slice(0,100))));
      });
    }

    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + (type || 'success');
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function doLogout() {
      localStorage.clear();
      window.location.href = '/login';
    }

    // Verify admin access
    if (!TOKEN) { window.location.href = '/login'; }

    api('GET', '/api/auth/me').then(json => {
      if (json.data.role !== 'admin') { window.location.href = '/'; }
    }).catch(() => { window.location.href = '/login'; });

    // Load admin data
    function loadAdminStats() {
      api('GET', '/api/admin/stats').then(json => {
        const d = json.data;
        document.getElementById('adminStats').innerHTML = `
          <div class="stat-card"><div class="stat-label">用户总数</div><div class="stat-value">${d.user_count}</div></div>
          <div class="stat-card"><div class="stat-label">卡牌总数</div><div class="stat-value">${d.total_cards}</div></div>
          <div class="stat-card"><div class="stat-label">数据库卡种</div><div class="stat-value">${d.total_catalog}</div></div>`;
      }).catch(() => {});
    }

    function loadUsers() {
      api('GET', '/api/admin/users').then(json => {
        document.getElementById('usersTableBody').innerHTML = json.data.map(u => `
          <tr>
            <td>${u.id}</td>
            <td style="font-weight:600;">${u.username || '--'}</td>
            <td style="font-family:monospace;font-size:12px;">${u.email || '--'}</td>
            <td>${u.nick_name || '--'}</td>
            <td style="font-family:monospace;font-size:11px;">${(u.openid || '').slice(0,18)}${u.openid ? '...' : '--'}</td>
            <td>${u.phone || '--'}</td>
            <td><span class="role-badge role-${u.role === 'admin' ? 'admin' : 'user'}">${u.role || 'user'}</span></td>
            <td>${u.card_count}</td>
            <td style="font-size:11px;">${(u.created_at || '').split(' ')[0]}</td>
          </tr>`).join('');
      }).catch(() => {});
    }

    function loadCatalogItems() {
      api('GET', '/api/catalog?per_page=500').then(json => {
        document.getElementById('catalogTableBody').innerHTML = json.data.map(c => `
          <tr>
            <td>${c.id}</td>
            <td>${c.image_url ? `<img src="${c.image_url}" style="width:36px;height:48px;border-radius:4px;object-fit:cover;">` : '--'}</td>
            <td style="font-weight:600;">${c.name}</td>
            <td>${c.set_name || '--'}</td>
            <td style="font-family:monospace;font-size:11px;">${c.card_number || '--'}</td>
            <td><span class="rarity-badge badge-${c.rarity}">${c.rarity}</span></td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editCatalogItem(${c.id})">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCatalogItem(${c.id}, '${c.name}')" style="margin-left:4px;">删除</button>
            </td>
          </tr>`).join('');
      }).catch(() => {});
    }

    // Catalog CRUD
    function openCatalogModal() {
      document.getElementById('catalogEditId').value = '';
      document.getElementById('catalogModalTitle').textContent = '新增卡种';
      document.getElementById('catalogForm').reset();
      document.getElementById('catalogModal').classList.add('show');
    }

    function closeCatalogModal() {
      document.getElementById('catalogModal').classList.remove('show');
    }

    function editCatalogItem(id) {
      api('GET', '/api/catalog/' + id).then(json => {
        const c = json.data;
        document.getElementById('catalogEditId').value = c.id;
        document.getElementById('catalogModalTitle').textContent = '编辑卡种';
        document.getElementById('catName').value = c.name || '';
        document.getElementById('catNameEn').value = c.name_en || '';
        document.getElementById('catSetName').value = c.set_name || '';
        document.getElementById('catCardNumber').value = c.card_number || '';
        document.getElementById('catRarity').value = c.rarity || 'R';
        document.getElementById('catImageUrl').value = c.image_url || '';
        document.getElementById('catDesc').value = c.description || '';
        document.getElementById('catalogModal').classList.add('show');
      }).catch(e => showToast(e.message, 'error'));
    }

    function saveCatalogItem(e) {
      e.preventDefault();
      const id = document.getElementById('catalogEditId').value;
      const data = {
        name: document.getElementById('catName').value.trim(),
        name_en: document.getElementById('catNameEn').value.trim(),
        set_name: document.getElementById('catSetName').value.trim(),
        card_number: document.getElementById('catCardNumber').value.trim(),
        rarity: document.getElementById('catRarity').value,
        image_url: document.getElementById('catImageUrl').value.trim(),
        description: document.getElementById('catDesc').value.trim()
      };
      const method = id ? 'PUT' : 'POST';
      const url = id ? '/api/catalog/' + id : '/api/catalog';
      api(method, url, data).then(() => {
        closeCatalogModal();
        showToast(id ? '已更新' : '已新增');
        loadCatalogItems();
      }).catch(e => showToast(e.message, 'error'));
    }

    function deleteCatalogItem(id, name) {
      if (!confirm('确定要删除 "' + name + '" 吗？此操作不可恢复。')) return;
      api('DELETE', '/api/catalog/' + id).then(() => {
        showToast('已删除');
        loadCatalogItems();
      }).catch(e => showToast(e.message, 'error'));
    }

    // Init
    loadAdminStats();
    loadUsers();
    loadCatalogItems();
  </script>
</body>
</html>
