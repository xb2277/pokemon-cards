<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 - 宝可梦卡牌管理器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=5">
  <style>
    .register-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
    }
    .register-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .register-card h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }
    .register-card .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .register-card .form-group {
      margin-bottom: 18px;
    }
    .register-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .register-card label .required {
      color: var(--red-500);
      margin-left: 2px;
    }
    .register-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg-primary);
      color: var(--text-primary);
      box-sizing: border-box;
      transition: border-color .2s, box-shadow .2s;
    }
    .register-card input:focus {
      outline: none;
      border-color: var(--gold-500);
      box-shadow: 0 0 0 3px rgba(212,175,95,.15);
    }
    .register-card input.error {
      border-color: var(--red-500);
      box-shadow: 0 0 0 3px rgba(229,62,62,.1);
    }
    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .field-error {
      font-size: 11px;
      color: var(--red-500);
      margin-top: 4px;
      display: none;
    }
    .register-btn {
      width: 100%;
      padding: 12px;
      background: var(--gold-500);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 8px;
    }
    .register-btn:hover { background: var(--gold-600); }
    .register-btn:disabled { opacity: .6; cursor: not-allowed; }
    .register-error {
      color: var(--red-500);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .register-success {
      color: #22543d;
      background: #c6f6d5;
      font-size: 13px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .login-link a {
      color: var(--gold-500);
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="register-page">
    <div class="register-card">
      <h1>POKÉ CARD</h1>
      <p class="subtitle">创建账号 · 开始管理你的收藏</p>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>邮箱 <span class="required">*</span></label>
          <input type="email" id="email" placeholder="your@email.com" required autofocus>
          <div class="field-hint">用于登录和找回密码</div>
          <div class="field-error" id="emailError"></div>
        </div>
        <div class="form-group">
          <label>用户名 <span class="required">*</span></label>
          <input type="text" id="username" placeholder="给自己取个名字" required minlength="2" maxlength="30">
          <div class="field-hint">2-30个字符</div>
          <div class="field-error" id="usernameError"></div>
        </div>
        <div class="form-group">
          <label>密码 <span class="required">*</span></label>
          <input type="password" id="password" placeholder="至少6个字符" required minlength="6">
          <div class="field-error" id="passwordError"></div>
        </div>
        <div class="form-group">
          <label>确认密码 <span class="required">*</span></label>
          <input type="password" id="confirmPassword" placeholder="再次输入密码" required minlength="6">
          <div class="field-error" id="confirmError"></div>
        </div>
        <button type="submit" class="register-btn" id="registerBtn">注 册</button>
        <p class="register-error" id="registerError"></p>
        <p class="register-success" id="registerSuccess"></p>
      </form>
      <div class="login-link">
        已有账号？<a href="/login">立即登录</a>
      </div>
    </div>
  </div>

  <script>
    // Clear field errors on input
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errEl = document.getElementById(input.id + 'Error');
        if (errEl) errEl.style.display = 'none';
      });
    });

    function showFieldError(fieldId, msg) {
      const input = document.getElementById(fieldId);
      const errEl = document.getElementById(fieldId + 'Error');
      if (input) input.classList.add('error');
      if (errEl) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      const btn = document.getElementById('registerBtn');
      const err = document.getElementById('registerError');
      const success = document.getElementById('registerSuccess');

      // Clear previous states
      err.style.display = 'none';
      success.style.display = 'none';
      document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
      document.querySelectorAll('.field-error').forEach(e => e.style.display = 'none');

      // Client-side validation
      let hasError = false;

      if (!email) {
        showFieldError('email', '请输入邮箱');
        hasError = true;
      } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        showFieldError('email', '邮箱格式不正确');
        hasError = true;
      }

      if (!username) {
        showFieldError('username', '请输入用户名');
        hasError = true;
      } else if (username.length < 2) {
        showFieldError('username', '用户名至少2个字符');
        hasError = true;
      }

      if (!password) {
        showFieldError('password', '请输入密码');
        hasError = true;
      } else if (password.length < 6) {
        showFieldError('password', '密码至少6个字符');
        hasError = true;
      }

      if (password !== confirmPassword) {
        showFieldError('confirmPassword', '两次输入的密码不一致');
        hasError = true;
      }

      if (hasError) return;

      btn.disabled = true;
      btn.textContent = '注册中...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, username, password, confirm_password: confirmPassword })
        });
        const json = await res.json();

        if (json.success && json.data.token) {
          localStorage.setItem('token', json.data.token);
          localStorage.setItem('role', 'user');

          // Show success message
          success.textContent = '注册成功！正在跳转...';
          success.style.display = 'block';
          btn.style.display = 'none';

          setTimeout(() => {
            window.location.href = '/';
          }, 1200);
        } else {
          err.textContent = json.message || '注册失败，请重试';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '注 册';
        }
      } catch (e) {
        err.textContent = '网络错误，请重试';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '注 册';
      }
    }

    // If already logged in, redirect
    const token = localStorage.getItem('token');
    if (token) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(json => {
        if (json.success) {
          window.location.href = '/';
        }
      })
      .catch(() => {});
    }
  </script>
</body>
</html>
